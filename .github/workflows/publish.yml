name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # contents: write + deployments: write are required by the
      # "Record GitHub Deployment" step to create a deployment on the tag ref
      # and post its status. With only contents:read, gh api returned
      # HTTP 403 "Resource not accessible by integration" on v1.8.0.
      contents: write
      deployments: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python - <<'PY'
          import os
          import sys
          import tomllib

          with open("pyproject.toml", "rb") as fp:
              version = tomllib.load(fp)["project"]["version"]

          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              sys.exit(
                  f"Tag {tag!r} does not match pyproject.toml version {version!r}. "
                  f"Use tag {expected!r}."
              )
          PY

      - name: Verify compiled extensions exist
        run: |
          if ! ls src/scansci_pdf/_core/*.pyd 2>/dev/null && ! ls src/scansci_pdf/_core/*.so 2>/dev/null; then
            echo "WARNING: No compiled extensions found. Package will use pure Python fallbacks."
          fi

      - name: Build package
        run: python -m build --sdist --wheel

      - name: Check package
        run: twine check --strict dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scansci-pdf-dist
          path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Record GitHub Deployment
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # Create a deployment for the 'pypi' environment pointing at this tag.
          # auto_merge:false avoids a 409 when master has moved past the tag.
          DEPLOYMENT_ID=$(echo "{\"ref\":\"$TAG\",\"environment\":\"pypi\",\"description\":\"Publish scansci-pdf $VERSION to PyPI\",\"required_contexts\":[],\"auto_merge\":false}" \
            | gh api --method POST \
              repos/${{ github.repository }}/deployments \
              --input - \
              --jq '.id')

          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "Failed to create deployment"
            exit 1
          fi

          # Mark it successful with a link to the PyPI project page.
          gh api --method POST \
            repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses \
            -f state="success" \
            -f environment="pypi" \
            -f environment_url="https://pypi.org/project/scansci-pdf/$VERSION/" \
            -f description="scansci-pdf $VERSION is live on PyPI" \
            --silent

          echo "Recorded deployment $DEPLOYMENT_ID for $TAG"
